spring.application.name=e-commerce-backend
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bandage_ecommerce}}
spring.datasource.username=${DB_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.property-naming-strategy=SNAKE_CASE

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
